{% extends "base.html" %}
{% block title %}Điều khiển pipeline{% endblock %}
{% block body %}
<h2>Điều khiển pipeline</h2>
<p id="summary" style="color:#8a93a6"></p>
<div style="background:#161a22;border:1px solid #232838;border-radius:8px;padding:12px;margin-bottom:14px">
  ⚙️ Model dịch:
  <input id="model" list="models" style="background:#0a0c10;color:#e6e6e6;border:1px solid #232838;border-radius:6px;padding:5px 8px;width:220px">
  <datalist id="models"></datalist>
  &nbsp; <label style="font-size:14px"><input type="checkbox" id="autoOffload">
  Dịch xong tự đẩy Drive → xóa local</label>
  <button onclick="saveSettings()">Lưu</button>
  <span id="settingsMsg" style="color:#8a93a6;font-size:13px"></span>
</div>
<pre id="log">(log của job đang chạy sẽ hiện ở đây)</pre>
<p><button class="gray" onclick="stopJob()">⏹ Dừng job hiện tại</button></p>
<table id="tbl">
  <thead><tr><th>Bộ truyện</th><th>Dịch</th><th>Local/Drive</th><th>Nguồn (MB)</th><th>Trạng thái</th><th></th></tr></thead>
  <tbody></tbody>
</table>
<h3>Lịch sử</h3>
<table id="hist"><tbody></tbody></table>
<script>
const badge = s => ({"hoàn thành":"b-done","đang dịch":"b-run","chưa dịch":"b-none","dở dang":"b-part","xếp hàng":"b-queue"}[s]||"b-none");
async function refresh() {
  const r = await fetch('/api/status'); const d = await r.json();
  document.getElementById('summary').textContent =
    `Disk trống: ${d.disk_free_gb}GB` + (d.current ? ` — đang dịch: ${d.current}` : ' — máy rảnh')
    + (d.queued.length ? ` — hàng đợi: ${d.queued.join(', ')}` : '');
  const tb = document.querySelector('#tbl tbody'); tb.innerHTML = '';
  for (const s of d.series) {
    const tr = document.createElement('tr');
    const busy = ['đang dịch','đang đẩy Drive','xếp hàng','hoàn thành'].includes(s.state);
    const canOffload = d.drive_ready && s.local > 0 && !['đang dịch','đang đẩy Drive','xếp hàng'].includes(s.state);
    const nm = s.title ? `${s.title}<br><span style="color:#8a93a6;font-size:12px">${s.name}</span>` : s.name;
    tr.innerHTML = `<td>${nm}</td><td>${s.out}/${s.in}</td>
      <td>${s.local}/${s.drive}</td><td>${s.mb} MB</td>
      <td><span class="badge ${badge(s.state)}">${s.state}</span></td>
      <td><button ${busy?'disabled':''} onclick="translateS('${s.name}')">Dịch</button>
          ${canOffload?`<button class="gray" onclick="offloadS('${s.name}')">☁️ Drive</button>`:''}
          ${!s.title && s.out>0?`<button class="gray" onclick="titleS('${s.name}')">🏷️ Tên</button>`:''}</td>`;
    tb.appendChild(tr);
  }
  const hb = document.querySelector('#hist tbody'); hb.innerHTML = '';
  for (const h of d.history) {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${h.at}</td><td>${h.series}</td><td>${h.minutes} phút</td>
      <td>${h.exit===0?'✅ OK':'❌ exit '+h.exit}</td>`;
    hb.appendChild(tr);
  }
}
async function loadSettings() {
  const d = await (await fetch('/api/settings')).json();
  document.getElementById('model').value = d.model;
  document.getElementById('autoOffload').checked = !!d.auto_offload;
  document.getElementById('models').innerHTML =
    d.known_models.map(m => `<option value="${m}">`).join('');
}
async function saveSettings() {
  const model = document.getElementById('model').value.trim();
  const auto_offload = document.getElementById('autoOffload').checked;
  const r = await fetch('/api/settings', {method:'POST',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify({model, auto_offload})});
  const d = await r.json().catch(()=>({}));
  document.getElementById('settingsMsg').textContent = r.ok ? d.result : (d.detail||'Lỗi');
}
async function titleS(name) {
  const r = await fetch('/api/title/'+encodeURIComponent(name), {method:'POST'});
  const d = await r.json().catch(()=>({}));
  if (!r.ok) alert(d.detail || 'Lỗi'); else refresh();
}
async function offloadS(name) {
  if (!confirm(`Đẩy toàn bộ ảnh gốc "${name}" lên Google Drive rồi XÓA bản local (web vẫn đọc được, tự tải từ Drive khi cần)?`)) return;
  const r = await fetch('/api/offload/'+encodeURIComponent(name), {method:'POST'});
  const d = await r.json().catch(()=>({}));
  if (!r.ok) alert(d.detail || 'Lỗi'); else refresh();
}
async function translateS(name) {
  const r = await fetch('/api/translate/'+encodeURIComponent(name), {method:'POST'});
  const d = await r.json().catch(()=>({}));
  if (!r.ok) alert(d.detail || 'Lỗi'); else refresh();
}
async function stopJob() {
  const r = await fetch('/api/stop', {method:'POST'}); const d = await r.json();
  alert(d.result); refresh();
}
const log = document.getElementById('log');
const es = new EventSource('/api/logs/stream');
es.onmessage = e => { log.textContent += e.data + '\n';
  if (log.textContent.length > 200000) log.textContent = log.textContent.slice(-100000);
  log.scrollTop = log.scrollHeight; };
refresh(); loadSettings(); setInterval(refresh, 5000);
</script>
{% endblock %}
